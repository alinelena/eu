  content : "I was born in 1980 (long time ago) in Dragasani, Valcea, Romania. First years I spent going to nursery school, kindergarden and playing. Then when I was almost 8 and they sent me to school. I did my primary, secondary and High School in my home town.
  On September 2000 I moved to Bucharest to study Physics at University of Bucharest. On June 2004 I graduated, on August 2004 I moved to Belfast to do my PhD and on February 2009 I moved to Dublin. For more read my CV.

  I have studied for a PhD at   Queen’s University Belfast   in the   Atomistic Simulation Centre.

  My supervisors were Prof Tony Paxton and Dr Tchavdar Todorov.

  My thesis topic was Time Dependent Tight Binding+U: Applications to fluorescent molecules (never submitted).
  I was employed by   Irish Centre for High-End Computing (ICHEC)   in the Dublin Offices as Computational Scientist.
  I got my PhD in School of Physics, at University College Dublin with   Professor Giovanni Ciccotti   and   Dr Simone Meloni.
  I was employed by   Irish Centre for High-End Computing (ICHEC)   in the Dublin Offices as Computational Scientist.
  \nCurrently I am employed by Science and Technology Facilities Council at Daresbury Laboratory as Computational Scientist.

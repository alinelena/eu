############################# Default Parameters ##########################
[params]
logo = "images/logo.png"
# Meta data
description = "AME"
author = "Alin M Elena"
# Google Analitycs
google_analitycs_id = "" # Your ID
# post share
post_share = true

# preloader
[params.preloader]
